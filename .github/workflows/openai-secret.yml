name: OpenAI secret check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  verify-secret:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify OPENAI_API_KEY is set (no value printed)
        run: |
          python3 - <<'PY'
          import os
          key = os.environ.get("OPENAI_API_KEY", "")
          if not key:
              raise SystemExit("OPENAI_API_KEY is missing. Add repository secret OPENAI_API_KEY.")
          if not (key.startswith("sk-") or key.startswith("sk-proj-")):
              raise SystemExit("OPENAI_API_KEY looks invalid (unexpected prefix).")
          print("OK: OPENAI_API_KEY is present.")
          PY
